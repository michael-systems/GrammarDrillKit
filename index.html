<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grammar Drill Kit</title>
    <script>
      try {
        const stored = JSON.parse(localStorage.getItem('grammar-drill-kit-progress') || 'null');
        const savedTheme = stored && stored.version === 1 ? stored.theme : null;
        const savedSize = stored && stored.version === 1 ? stored.interfaceSize : null;
        const validSizes = ['compact', 'small', 'medium', 'large'];
        const theme = savedTheme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.size = validSizes.includes(savedSize) ? savedSize : 'medium';
      } catch {
        document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.size = 'medium';
      }
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <header class="app-header">
          <p class="eyebrow">English practice for Russian-speaking learners</p>
          <h1>Grammar Drill Kit</h1>
          <p class="lede">Choose a practice mode, difficulty, and session size for focused English grammar drills.</p>
        </header>

        <div id="app" aria-live="polite"></div>
      </section>
      <footer class="creator-footer">
        <a href="https://telegram.me/lifeforevery" target="_blank" rel="noopener noreferrer">Made by M</a>
      </footer>
    </main>

    <script type="module" src="src/app.js?v=20260719-session-size"></script>
  </body>
</html>
