<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grammar Drill Kit</title>
    <script>
      try {
        const stored = JSON.parse(localStorage.getItem('grammar-drill-kit-progress') || 'null');
        const savedTheme = stored && stored.version === 1 ? stored.theme : null;
        const theme = savedTheme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch {
        document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <header class="app-header">
          <p class="eyebrow">English practice for Russian-speaking learners</p>
          <h1>Grammar Drill Kit</h1>
          <p class="lede">Choose a module and practise one reusable quiz flow across focused grammar topics.</p>
        </header>

        <div id="app" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
