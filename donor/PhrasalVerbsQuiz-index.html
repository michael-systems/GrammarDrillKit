    :root { --bg:#0b132b; --card:#1c2541; --accent:#5bc0be; --muted:#b3c2cf; --good:#32d296; --bad:#ff6b6b; }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:#fff;margin:0; position: relative; min-height: 100vh; padding-bottom: 60px; box-sizing: border-box;}
    .wrap{max-width:860px;margin:0 auto;padding:24px}
    .card{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .header .progress{font-weight:700;color:var(--accent);letter-spacing:.5px}
    .bar{height:6px;background:#0f1b3d;border-radius:999px;overflow:hidden;margin:10px 0 18px}
    .bar>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#9fffe0);transition:width .3s ease}
    h2{margin:10px 0 8px;font-weight:750}
    .ru{color:var(--muted);margin:0 0 8px;display:none}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}
    button.opt{background:#0f1b3d;color:#fff;border:1px solid #233056;border-radius:12px;padding:12px 14px;text-align:left;cursor:pointer;transition:.15s}
    button.opt:hover{border-color:var(--accent);transform:translateY(-1px)}
    button.opt.correct{background:rgba(50,210,150,.15);border-color:var(--good)}
    button.opt.wrong{background:rgba(255,107,107,.15);border-color:var(--bad)}
    .feedback{margin-top:10px;font-weight:700}
    .ex{margin-top:4px;color:#e6f7ff}
    .controls{margin-top:16px;display:flex;gap:10px}
    .btn{background:var(--accent);color:#001219;border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .btn.secondary{background:#233056;color:#fff}
    .center{text-align:center}
    .stat{display:grid;gap:14px}
    .stat .row{display:flex;justify-content:space-between;font-size:1.05rem}
    .big{font-size:1.3rem;font-weight:800}
    .quote{margin-top:18px;color:var(--muted);font-style:italic}
    .level-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
    .level-btn{padding:16px;border-radius:12px;background:#233056;border:2px solid transparent;color:white;font-weight:700;cursor:pointer;transition:all 0.3s}
    .level-btn:hover{transform:translateY(-2px);border-color:var(--accent)}
    .level-btn.active{background:var(--accent);color:#001219}
    .footer{position: fixed; bottom: 20px; left: 0; right: 0; text-align: center;}
    .footer-link{color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.3s;}
    .footer-link:hover{color: var(--accent);}
  </style>
</head>

  { q:"Return it to the shelf.", rt:"Поставь это обратно на полку.", key:"put back", tense:"present", ex:"Put it back on the shelf." },
  { q:"The thief managed to escape.", rt:"Вору удалось сбежать.", key:"get away", tense:"past", ex:"The thief managed to get away." },

  { q:"He parked illegally but wasn't punished for it.", rt:"Он припарковался неправильно, но ему это сошло с рук.", key:"get away with", tense:"past", ex:"He parked illegally but got away with it." },
  { q:"Keep your distance from the edge!", rt:"Держись подальше от края!", key:"keep away from", tense:"present", ex:"Keep away from the edge!" },
  { q:"She donated her old clothes.", rt:"Она отдала свою старую одежду.", key:"give away", tense:"past", ex:"She gave away her old clothes." },
  { q:"They stored the dishes in the cupboard.", rt:"Они убрали посуду в шкаф.", key:"put away", tense:"past", ex:"They put away the dishes in the cupboard." },
  { q:"I discarded the empty bottle.", rt:"Я выбросил пустую бутылку.", key:"throw away", tense:"past", ex:"I threw away the empty bottle." },
  { q:"She smiled and waved in return.", rt:"Она улыбнулась и помахала в ответ.", key:"wave back", tense:"past", ex:"She smiled and waved back." },
  { q:"I'll return your call later.", rt:"Я перезвоню тебе позже.", key:"call back", tense:"present", ex:"I'll call you back later." },
  { q:"He never responded to me.", rt:"Он так и не ответил мне.", key:"get back to", tense:"past", ex:"He never got back to me." },
  { q:"When I reflect on it, I realize I learned a lot.", rt:"Оглядываясь назад, я многому научился.", key:"look back", tense:"present", ex:"Looking back, I learned a lot." },
  { q:"I'll repay you next week.", rt:"Я верну тебе деньги на следующей неделе.", key:"pay back", tense:"present", ex:"I'll pay you back next week." }
];

// Разделяем данные на 3 уровня
const LEVELS = {
  1: DATA.slice(0, 50),   // Basic
  2: DATA.slice(50, 100), // Intermediate  
  3: DATA.slice(100, 150) // Advanced
};

// Engine
let currentLevel = 1;
let currentData = LEVELS[1];
let ALL_OPTIONS = Array.from(new Set(currentData.map(d=>d.key)));
let order = currentData.map((_,i)=>i);
let wrongIndices = []; // Сохраняем индексы ошибок

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
shuffle(order);

let idx=0;
let correct=0;
let wrong=0;

function initializeLevel(level) {
  currentLevel = level;
  currentData = LEVELS[level];
  ALL_OPTIONS = Array.from(new Set(currentData.map(d=>d.key)));
  order = currentData.map((_,i)=>i);
  shuffle(order);
  idx = 0;
  correct = 0;
  wrong = 0;
  wrongIndices = [];
}

function renderLevelSelection(){
  const stage=document.getElementById('stage');
  stage.innerHTML=`
    <div class="center">
      <div class="big">Choose Your Level</div>
      <div class="quote">Select difficulty level to begin</div>
      <div class="level-buttons">
        <button class="level-btn ${currentLevel===1?'active':''}" id="level1">Level 1: Basic<br><small>50 phrasal verbs</small></button>
        <button class="level-btn ${currentLevel===2?'active':''}" id="level2">Level 2: Intermediate<br><small>50 phrasal verbs</small></button>
        <button class="level-btn ${currentLevel===3?'active':''}" id="level3">Level 3: Advanced<br><small>50 phrasal verbs</small></button>
      </div>
      <div class="controls">
        <button class="btn" id="startQuiz">Start Quiz</button>
      </div>
    </div>
  `;

  document.getElementById('level1').onclick=()=>{
    currentLevel=1;
    renderLevelSelection();
  };
  document.getElementById('level2').onclick=()=>{
    currentLevel=2;
    renderLevelSelection();
  };
  document.getElementById('level3').onclick=()=>{
    currentLevel=3;
    renderLevelSelection();
  };
  document.getElementById('startQuiz').onclick=()=>{
    initializeLevel(currentLevel);
    renderQuestion();
  };
}

function renderQuestion(){
  const total=order.length; 
  const i=order[idx]; 
  const item=currentData[i];
  const stage=document.getElementById('stage'); 
  const prog=Math.floor((idx/total)*100);
  
  const distractors=shuffle(ALL_OPTIONS.filter(x=>x!==item.key)).slice(0,4);
  const choices=shuffle([item.key,...distractors]);
  
  stage.innerHTML=`
    <div class="header">
      <div class="progress">Level ${currentLevel} • Question ${idx+1} of ${total}</div>
    </div>
    <div class="bar"><div style="width:${prog}%"></div></div>
    <h2>${item.q}</h2>
    <p class="ru" id="ru">${item.rt}</p>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <div class="ex" id="ex"></div>
    <div class="controls">
      <button class="btn secondary" id="reveal">Show translation</button>
      <button class="btn" id="next" style="display:none">Next</button>
    </div>
  `;
  
  const opts=document.getElementById('opts'); 
  const fb=document.getElementById('fb'); 
  const ex=document.getElementById('ex');
  const next=document.getElementById('next'); 
  const ru=document.getElementById('ru'); 
  const reveal=document.getElementById('reveal');
  
  reveal.onclick=()=>{ru.style.display='block'};
  
  choices.forEach(c=>{
    const b=document.createElement('button'); 
    b.className='opt'; 
    b.textContent=c; 
    b.onclick=()=>{
      const ok=(c===item.key); 
      if(ok){
        b.classList.add('correct');
        fb.textContent='✅ Correct';
        correct++;
      } else {
        b.classList.add('wrong');
        fb.textContent='❌ Try again';
        wrong++;
        wrongIndices.push(i); // Сохраняем индекс ошибки
      } 
      Array.from(opts.children).forEach(el=>el.disabled=true); 
      ru.style.display='block'; 
      ex.textContent='Example: '+item.ex; 
      next.style.display='inline-block';
    }; 
    opts.appendChild(b);
  });
  
  next.onclick=()=>{
    idx++; 
    if(idx<total){
      renderQuestion();
    } else {
      renderStats();
    }
  };
}

function renderStats(){
  const stage=document.getElementById('stage'); 
  const accuracy=(correct+wrong)?((correct/(correct+wrong))*100).toFixed(0):'0';
  
  let quote = '';
  if (currentLevel === 1) {
    quote = 'Constantly move. Hell devour idle.';
  } else if (currentLevel === 2) {
    quote = 'There is no try, only do.';
  } else if (currentLevel === 3) {
    quote = 'Nothing is true, everything is permitted.';
  }
  
  stage.innerHTML=`
    <div class="center">
      <div class="big">Level ${currentLevel} Complete!</div>
      <div class="stat" style="margin-top:12px">
        <div class="row"><span>Correct</span><strong style="color:var(--good)">${correct}</strong></div>
        <div class="row"><span>Wrong</span><strong style="color:var(--bad)">${wrong}</strong></div>
        <div class="row"><span>Accuracy</span><strong>${accuracy}%</strong></div>
      </div>
      <div class="quote">${quote}</div>
      <div class="controls" style="justify-content:center; margin-top:16px;">
        ${wrongIndices.length > 0 ? '<button class="btn" id="correctMistakes">Correct Mistakes</button>' : ''}
        <button class="btn secondary" id="chooseLevel">Choose Level</button>
        <button class="btn secondary" id="restartLevel">Restart Level</button>
      </div>
    </div>
  `;
  
  document.getElementById('chooseLevel').onclick=renderLevelSelection;
  document.getElementById('restartLevel').onclick=()=>{
    initializeLevel(currentLevel);
    renderQuestion();
  };
  
  const correctMistakesBtn = document.getElementById('correctMistakes');
  if(correctMistakesBtn){
    correctMistakesBtn.onclick=()=>{
      // Берем только те вопросы, где были ошибки
      order = wrongIndices.slice();
      shuffle(order);
      idx=0;correct=0;wrong=0;wrongIndices=[];
      renderQuestion();
    };
  }
}

// Start with level selection
renderLevelSelection();
</script>
</body>
</html>
